services:
  postgres:
    image: postgres:17-alpine
    container_name: market-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      TZ: Asia/Seoul
    volumes:
      - market-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - market-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  market-postgres-data:
  market-redis-data:
