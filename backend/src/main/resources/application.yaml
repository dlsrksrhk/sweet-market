spring:
  application:
    name: market
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-batch-postgresql.sql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:15432}/${DB_NAME:market}
    username: ${DB_USERNAME:market}
    password: ${DB_PASSWORD:market}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}

catalog:
  cursor:
    secret: ${CATALOG_CURSOR_SECRET:sweet-market-local-catalog-cursor-secret-key-32bytes-minimum}
    max-age: ${CATALOG_CURSOR_MAX_AGE:30m}

product:
  images:
    upload-root: ${PRODUCT_IMAGE_UPLOAD_ROOT:./.local/product-images}
    temp-dir: temp
    public-dir: public
    temp-expiration: ${PRODUCT_IMAGE_TEMP_EXPIRATION:60m}
    cleanup-cron: "${PRODUCT_IMAGE_CLEANUP_CRON:0 */10 * * * *}"
    max-file-size: 5MB

web:
  cors:
    allowed-origins:
      - http://localhost:5173
