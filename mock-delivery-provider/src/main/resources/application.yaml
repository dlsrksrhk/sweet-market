spring:
  application:
    name: mock-delivery-provider
  datasource:
    url: jdbc:postgresql://${DELIVERY_PROVIDER_DB_HOST:localhost}:${DELIVERY_PROVIDER_DB_PORT:15434}/${DELIVERY_PROVIDER_DB_NAME:delivery_provider}
    username: ${DELIVERY_PROVIDER_DB_USERNAME:delivery_provider}
    password: ${DELIVERY_PROVIDER_DB_PASSWORD:delivery_provider}
  flyway:
    enabled: true
  sql:
    init:
      mode: never
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${DELIVERY_PROVIDER_PORT:8082}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info

provider:
  integration-security:
    allowed-clock-skew: PT5M
    max-body-bytes: 1048576
    replay-retention: PT10M
    cleanup-batch-size: 1000
    clients:
      - client-id: sweet-market
        api-key: ${DELIVERY_PROVIDER_MERCHANT_API_KEY:}
        keys:
          - key-id: ${DELIVERY_PROVIDER_HMAC_CURRENT_KEY_ID:}
            secret: ${DELIVERY_PROVIDER_HMAC_CURRENT_SECRET:}
          - key-id: ${DELIVERY_PROVIDER_HMAC_NEXT_KEY_ID:}
            secret: ${DELIVERY_PROVIDER_HMAC_NEXT_SECRET:}
