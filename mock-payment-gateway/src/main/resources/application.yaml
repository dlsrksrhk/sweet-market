server:
  port: ${PAYMENT_GATEWAY_PORT:8081}

spring:
  application:
    name: mock-payment-gateway
  datasource:
    url: jdbc:postgresql://${PAYMENT_GATEWAY_DB_HOST:localhost}:${PAYMENT_GATEWAY_DB_PORT:15433}/${PAYMENT_GATEWAY_DB_NAME:payment_gateway}
    username: ${PAYMENT_GATEWAY_DB_USERNAME:payment_gateway}
    password: ${PAYMENT_GATEWAY_DB_PASSWORD:payment_gateway}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  sql:
    init:
      mode: never
  jackson:
    deserialization:
      fail-on-unknown-properties: true

gateway:
  integration-security:
    allowed-clock-skew: PT5M
    max-body-bytes: 1048576
    replay-retention: PT10M
    cleanup-batch-size: 1000
    clients:
      - client-id: sweet-market
        api-key: ${PAYMENT_GATEWAY_MERCHANT_API_KEY}
        keys:
          - key-id: ${PAYMENT_GATEWAY_HMAC_CURRENT_KEY_ID}
            secret: ${PAYMENT_GATEWAY_HMAC_CURRENT_SECRET}
          - key-id: ${PAYMENT_GATEWAY_HMAC_NEXT_KEY_ID}
            secret: ${PAYMENT_GATEWAY_HMAC_NEXT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
